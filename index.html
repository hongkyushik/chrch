function fmt(n) { if (!n && n !== 0) return ""; return Number(n).toLocaleString("ko-KR"); }
function getToday() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function getMK(d) { return String(d).slice(0,7); }
function getYK(d) { return String(d).slice(0,4); }

// ──── Supabase REST API helpers ────
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "return=representation",
      ...opts.headers,
    },
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`Supabase error: ${res.status} ${t}`); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadEntries() {
  return await sbFetch(`${TABLE}?select=*&order=date.asc,id.asc`);
}

async function insertEntry(entry) {
  const rows = await sbFetch(TABLE, {
    method: "POST",
    body: JSON.stringify(entry),
  });
  return rows[0];
}

async function deleteEntry(id) {
  await sbFetch(`${TABLE}?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
}

async function updateEntry(id, fields) {
  await sbFetch(`${TABLE}?id=eq.${id}`, {
    method: "PATCH",
    body: JSON.stringify(fields),
  });
}

async function insertMany(entries) {
  return await sbFetch(TABLE, {
    method: "POST",
    body: JSON.stringify(entries),
  });
}

async function deleteAll() {
  await sbFetch(`${TABLE}?id=gt.0`, { method: "DELETE", prefer: "return=minimal" });
}

// ──── Export helpers ────
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 500);
}

// ──── Components ────
function NumberInput({value,onChange,placeholder,className}){
  const[display,setDisplay]=useState(value?fmt(value):"");
  useEffect(()=>{setDisplay(value?fmt(value):"");},[value]);
  return <input type="text" inputMode="numeric" className={className} placeholder={placeholder} value={display}
    onChange={e=>{const raw=e.target.value.replace(/[^0-9]/g,"");setDisplay(raw?fmt(parseInt(raw)):"");onChange(parseInt(raw)||0);}}/>;
}

    await onAdd({date:form.date,type:form.type,category:form.category.trim(),amount:form.amount,memo:form.memo.trim()});
    setForm(f=>({...f,amount:0,memo:""}));firstRef.current?.focus();
  };
  const kd=e=>{if(e.key==="Enter")handleSubmit();};
  const isExp=form.type==="지출";
  return(

// ──── Excel Import Modal ────
function ImportExcelModal({onImport,onClose}){
  const[preview,setPreview]=useState(null);const[headers,setHeaders]=useState([]);const[rows,setRows]=useState([]);
  const[mapping,setMapping]=useState({date:"",type:"",category:"",amount:"",memo:""});
  const[importMode,setImportMode]=useState("append");const[error,setError]=useState("");
  const FIELDS=[{key:"date",label:"날짜",required:true},{key:"type",label:"구분 (수입/지출)",required:true},{key:"category",label:"종류/항목",required:true},{key:"amount",label:"금액",required:true},{key:"memo",label:"메모",required:false}];

  const formatDateValue=(val)=>{if(!val)return null;if(val instanceof Date){const y=val.getFullYear();const m=String(val.getMonth()+1).padStart(2,"0");const d=String(val.getDate()).padStart(2,"0");return`${y}-${m}-${d}`;}const s=String(val).trim();if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){const[y,m,d]=s.split("-");return`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;}if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)){const[y,m,d]=s.split("/");return`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;}if(/^\d{4}\.\d{1,2}\.\d{1,2}$/.test(s)){const[y,m,d]=s.split(".");return`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;}if(/^\d{8}$/.test(s))return`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;if(/^\d{5}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);if(!isNaN(d.getTime()))return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}return null;};

  const handleFile=async(e)=>{const file=e.target.files[0];if(!file)return;setError("");
    try{const XLSX=await import("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array",cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const jsonData=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(jsonData.length<2){setError("데이터가 부족합니다.");return;}
      const hdrs=jsonData[0].map(h=>String(h).trim());const dataRows=jsonData.slice(1).filter(r=>r.some(c=>c!==""));setHeaders(hdrs);setRows(dataRows);setPreview(file.name);
      const autoMap={date:"",type:"",category:"",amount:"",memo:""};
      hdrs.forEach((h,i)=>{const low=h.toLowerCase();if(!autoMap.date&&(low.includes("날짜")||low.includes("date")||low.includes("일자")))autoMap.date=String(i);if(!autoMap.type&&(low.includes("구분")||low.includes("type")||low.includes("유형")))autoMap.type=String(i);if(!autoMap.category&&(low.includes("종류")||low.includes("항목")||low.includes("category")||low.includes("헌금")))autoMap.category=String(i);if(!autoMap.amount&&(low.includes("금액")||low.includes("amount")||low.includes("원")))autoMap.amount=String(i);if(!autoMap.memo&&(low.includes("메모")||low.includes("memo")||low.includes("비고")))autoMap.memo=String(i);});
      setMapping(autoMap);
    }catch(err){setError("파일을 읽을 수 없습니다. .xlsx, .xls, .csv 형식만 지원됩니다.");}
  };

  const handleImport=()=>{
    if(!mapping.date||!mapping.type||!mapping.category||!mapping.amount){setError("날짜, 구분, 종류/항목, 금액은 필수 매핑 항목입니다.");return;}
    const parsed=[];let skipped=0;
    rows.forEach(row=>{const dateVal=formatDateValue(row[parseInt(mapping.date)]);const typeRaw=String(row[parseInt(mapping.type)]||"").trim();const category=String(row[parseInt(mapping.category)]||"").trim();const amountRaw=row[parseInt(mapping.amount)];const memo=mapping.memo?String(row[parseInt(mapping.memo)]||"").trim():"";
      let amount=0;if(typeof amountRaw==="number")amount=Math.abs(Math.round(amountRaw));else amount=Math.abs(parseInt(String(amountRaw).replace(/[^0-9-]/g,""),10)||0);
      let type="";if(typeRaw.includes("수입")||typeRaw.includes("income")||typeRaw.includes("입금"))type="수입";else if(typeRaw.includes("지출")||typeRaw.includes("expense")||typeRaw.includes("출금"))type="지출";else type="수입";
      if(!dateVal||!category||!amount){skipped++;return;}
      parsed.push({date:dateVal,type,category,amount,memo});
    });
    if(!parsed.length){setError("유효한 데이터가 없습니다.");return;}
    onImport(parsed,importMode);onClose();alert(`${parsed.length}건 가져오기 완료${skipped?` (${skipped}건 건너뜀)`:""}`);
  };

  return(
    <div style={S.modalOverlay} onClick={onClose}><div style={{...S.modal,maxWidth:600,maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={S.modalTitle}>📊 엑셀 데이터 불러오기</div><div style={S.modalSub}>기존 엑셀 파일(.xlsx, .xls, .csv)의 데이터를 가져올 수 있습니다</div>
      <div style={{...S.modalSection,marginTop:16}}><label style={{...S.label,marginBottom:8,display:"block"}}>파일 선택</label><input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{fontSize:14,fontFamily:"'Noto Sans KR',sans-serif"}}/></div>
      {error&&<div style={{padding:"10px 14px",background:"#fce4e4",borderRadius:8,color:"#b91c1c",fontSize:13,marginBottom:16}}>{error}</div>}
      {preview&&<>
        <div style={{padding:"10px 14px",background:"#f0faf0",borderRadius:8,color:"#2e7d32",fontSize:13,marginBottom:16}}>✓ <strong>{preview}</strong> 로드 완료 — {rows.length}행, {headers.length}열 감지</div>
        <div style={S.modalSection}><label style={{...S.label,marginBottom:12,display:"block"}}>칼럼 매핑</label><div style={{fontSize:12,color:"#8b7a65",marginBottom:12}}>엑셀의 각 열이 어떤 항목에 해당하는지 선택해주세요</div>
          {FIELDS.map(f=><div key={f.key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:120,fontSize:13,fontWeight:600,color:"#5a4332"}}>{f.label}{f.required&&<span style={{color:"#b91c1c"}}> *</span>}</div><select style={{...S.input,flex:1,fontSize:13,padding:"8px 10px"}} value={mapping[f.key]} onChange={e=>setMapping(m=>({...m,[f.key]:e.target.value}))}><option value="">— 선택 안함 —</option>{headers.map((h,i)=><option key={i} value={String(i)}>{h}</option>)}</select></div>)}
        </div>
        <div style={S.modalSection}><label style={{...S.label,marginBottom:8,display:"block"}}>미리보기 (처음 5행)</label>
          <div style={{overflowX:"auto",borderRadius:8,border:"1px solid #d4c9b8"}}><table style={{...S.table,fontSize:12}}><thead><tr>{headers.map((h,i)=>{const mapped=Object.entries(mapping).find(([k,v])=>v===String(i));return<th key={i} style={{...S.th,fontSize:11,padding:"8px 6px",background:mapped?"#e8f5e9":"#faf5ed"}}>{h}{mapped&&<span style={{color:"#2e7d32"}}> → {FIELDS.find(f=>f.key===mapped[0])?.label}</span>}</th>;})}</tr></thead><tbody>{rows.slice(0,5).map((row,ri)=><tr key={ri} style={S.tr}>{headers.map((_,ci)=><td key={ci} style={{...S.td,fontSize:12,padding:"6px"}}>{row[ci] instanceof Date?formatDateValue(row[ci]):String(row[ci]??"")}</td>)}</tr>)}</tbody></table></div>
        </div>
        <div style={S.modalSection}><label style={{...S.label,marginBottom:8,display:"block"}}>가져오기 방식</label>
          <div style={{display:"flex",gap:8}}><button style={{...S.scopeBtn,...(importMode==="append"?S.scopeBtnActive:{})}} onClick={()=>setImportMode("append")}>기존 데이터에 추가</button><button style={{...S.scopeBtn,...(importMode==="replace"?{...S.scopeBtnActive,background:"#b91c1c",borderColor:"#b91c1c"}:{})}} onClick={()=>setImportMode("replace")}>기존 데이터 대체</button></div>
          {importMode==="replace"&&<div style={{fontSize:12,color:"#b91c1c",marginTop:8}}>⚠ 기존 데이터가 모두 삭제되고 새 데이터로 교체됩니다</div>}
        </div>
        <button style={{...S.reportBtnExcel,marginTop:16}} onClick={handleImport}>📥 {rows.length}건 가져오기</button>
      </>}
      <button style={{...S.modalClose,marginTop:16}} onClick={onClose}>닫기</button>
    </div></div>
  );
}

// ──── Main App ────
function App(){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");
  const[viewMode,setViewMode]=useState("monthly");
  const[selectedMonth,setSelectedMonth]=useState(getToday().slice(0,7));
  const[selectedYear,setSelectedYear]=useState(getToday().slice(0,4));
  const[showMenu,setShowMenu]=useState(false);
  const[showReport,setShowReport]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[typeFilter,setTypeFilter]=useState(null);

  const refresh=useCallback(async()=>{
    try{const data=await loadEntries();setEntries(data);setError("");}
    catch(e){setError("데이터를 불러올 수 없습니다. 인터넷 연결을 확인해주세요.");}
  },[]);

  useEffect(()=>{refresh().then(()=>setLoading(false));},[refresh]);

  // Auto-refresh every 30 seconds for multi-user sync
  useEffect(()=>{const id=setInterval(refresh,30000);return()=>clearInterval(id);},[refresh]);

  const handleAdd=useCallback(async(entry)=>{
    setSaving(true);
    try{await insertEntry(entry);await refresh();}
    catch(e){alert("저장에 실패했습니다: " + e.message);}
    finally{setSaving(false);}
  },[refresh]);

  const handleDelete=useCallback(async(id)=>{
    if(!confirm("이 항목을 삭제하시겠습니까?"))return;
    try{await deleteEntry(id);await refresh();}
    catch(e){alert("삭제에 실패했습니다.");}
  },[refresh]);

  const handleEdit=useCallback(async(id,fields)=>{
    try{await updateEntry(id,fields);await refresh();}
    catch(e){alert("수정에 실패했습니다: "+e.message);}
  },[refresh]);

  const handleImportExcel=useCallback(async(parsed,mode)=>{
    setSaving(true);
    try{
      if(mode==="replace")await deleteAll();
      // Insert in batches of 100
      for(let i=0;i<parsed.length;i+=100){
        await insertMany(parsed.slice(i,i+100));
      }
      await refresh();
    }catch(e){alert("가져오기에 실패했습니다: " + e.message);}
    finally{setSaving(false);}
  },[refresh]);

  const handleReset=useCallback(async()=>{
    if(!confirm("모든 데이터를 초기화하시겠습니까?"))return;
    if(!confirm("정말 삭제하시겠습니까? 마지막 확인입니다."))return;
    try{await deleteAll();await refresh();}catch(e){alert("초기화에 실패했습니다.");}
  },[refresh]);

  const months=[...new Set(entries.map(e=>getMK(e.date)).concat([getToday().slice(0,7)]))].sort().reverse();
  const years=[...new Set(entries.map(e=>getYK(e.date)).concat([getToday().slice(0,4)]))].sort().reverse();

  if(loading)return<div style={S.loadingWrap}><div style={S.spinner}></div><div style={S.loadingText}>데이터를 불러오는 중...</div></div>;

  return(
    <div style={S.root}><style>{globalCSS}</style>
      <header style={S.header}><div style={S.headerInner}>
        <div style={S.headerLeft}><div style={S.crossIcon}>✝</div><div><h1 style={S.title}>재송성결교회</h1><p style={S.subtitle}>헌금 출납부</p></div></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button style={S.syncBtn} onClick={refresh} title="새로고침">🔄</button>
          <button style={S.headerBtn} onClick={()=>{setShowReport(true);setShowMenu(false);}}>📋</button>
          <div style={{position:"relative"}}><button style={S.headerBtn} onClick={()=>setShowMenu(!showMenu)}>⚙</button>
            {showMenu&&<div style={S.dropdown}>
              <button style={S.dropItem} onClick={()=>{setShowImport(true);setShowMenu(false);}}>📊 엑셀 데이터 불러오기</button>
              <div style={S.dropDiv}/>
              <button style={{...S.dropItem,color:"#b91c1c"}} onClick={async()=>{await handleReset();setShowMenu(false);}}>🗑 데이터 초기화</button>
            </div>}
          </div>
        </div>
      </div></header>

      <main style={S.main}>
        {error&&<div style={{padding:"12px 16px",background:"#fce4e4",borderRadius:10,color:"#b91c1c",fontSize:14,marginBottom:16,textAlign:"center"}}>{error}</div>}

        <div style={S.connBadge}><span style={S.connDot}></span> Supabase 클라우드 연동 · {entries.length}건 · 자동 동기화</div>

        <EntryForm onAdd={handleAdd} saving={saving}/>

        <div style={S.viewBar}>
          <button style={{...S.viewBtn,...(viewMode==="monthly"?S.viewActive:{})}} onClick={()=>{setViewMode("monthly");setTypeFilter(null);}}>📅 월별 보기</button>
          <button style={{...S.viewBtn,...(viewMode==="yearly"?S.viewActive:{})}} onClick={()=>{setViewMode("yearly");setTypeFilter(null);}}>📊 연도별 보기</button>
        </div>

        {viewMode==="monthly"?<>
          <div style={S.monthBar}><div style={S.monthScroll}>{months.map(m=><button key={m} style={{...S.monthBtn,...(selectedMonth===m?S.monthBtnA:{})}} onClick={()=>setSelectedMonth(m)}>{m.replace("-","년 ")}월</button>)}</div></div>
          <SummaryCards entries={entries} filterFn={e=>getMK(e.date)===selectedMonth} typeFilter={typeFilter} onTypeFilter={setTypeFilter}/>
          <LedgerTable entries={entries} month={selectedMonth} onDelete={handleDelete} onEdit={handleEdit} typeFilter={typeFilter}/>
        </>:<>
          <div style={S.monthBar}><div style={S.monthScroll}>{years.map(y=><button key={y} style={{...S.monthBtn,...(selectedYear===y?S.monthBtnA:{})}} onClick={()=>setSelectedYear(y)}>{y}년</button>)}</div></div>
          <SummaryCards entries={entries} filterFn={e=>getYK(e.date)===selectedYear} typeFilter={typeFilter} onTypeFilter={setTypeFilter}/>
          <YearlySummary entries={entries} year={selectedYear}/>
        </>}
      </main>

      {showReport&&<ReportModal entries={entries} onClose={()=>setShowReport(false)} viewMode={viewMode} selectedMonth={selectedMonth} selectedYear={selectedYear}/>}
      {showImport&&<ImportExcelModal onImport={handleImportExcel} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}
